<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F7F8FA"/>

  <g font-family="Outfit, Avenir Next, Arial, sans-serif">
    <text x="96" y="92" fill="#6B7280" font-size="18" font-weight="650">AI Backend Architecture</text>
    <text x="96" y="154" fill="#111827" font-size="54" font-weight="720">The integration layer has three paths.</text>
    <text x="96" y="204" fill="#4B5563" font-size="27" font-weight="400">Each path controls a different part of the runtime around the LLM.</text>

    <line x1="96" y1="268" x2="1504" y2="268" stroke="#D5DAE1" stroke-width="1.5"/>

    <g transform="translate(96 354)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="750">01</text>
      <text x="0" y="52" fill="#111827" font-size="38" font-weight="720">Context path</text>
      <text x="0" y="104" fill="#374151" font-size="25" font-weight="400">What the LLM can know</text>
      <line x1="0" y1="158" x2="360" y2="158" stroke="#111827" stroke-width="2"/>
    </g>

    <g transform="translate(610 354)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="750">02</text>
      <text x="0" y="52" fill="#111827" font-size="38" font-weight="720">Action path</text>
      <text x="0" y="104" fill="#374151" font-size="25" font-weight="400">What the agent can do</text>
      <line x1="0" y1="158" x2="360" y2="158" stroke="#111827" stroke-width="2"/>
    </g>

    <g transform="translate(1124 354)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="750">03</text>
      <text x="0" y="52" fill="#111827" font-size="38" font-weight="720">Model path</text>
      <text x="0" y="104" fill="#374151" font-size="25" font-weight="400">How the request runs</text>
      <line x1="0" y1="158" x2="360" y2="158" stroke="#111827" stroke-width="2"/>
    </g>

    <line x1="96" y1="650" x2="1504" y2="650" stroke="#D5DAE1" stroke-width="1.5"/>
    <text x="96" y="716" fill="#111827" font-size="31" font-weight="650">The backend now has to control context, actions, and model choice around every request.</text>

    <text x="96" y="824" fill="#6B7280" font-size="18" font-weight="600">Samuel Umoren / AI Backend Notes</text>
  </g>
</svg>
