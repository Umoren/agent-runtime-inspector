<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F7F8FA"/>
  <g font-family="Outfit, Avenir Next, Arial, sans-serif">
    <text x="96" y="92" fill="#6B7280" font-size="18" font-weight="650">Connector Reliability</text>
    <text x="96" y="154" fill="#111827" font-size="52" font-weight="720">Connector failure becomes product failure.</text>
    <text x="96" y="204" fill="#4B5563" font-size="27" font-weight="400">When agents use tools, connector behavior reaches the user as product behavior.</text>
    <line x1="96" y1="270" x2="1504" y2="270" stroke="#D5DAE1" stroke-width="1.5"/>

    <text x="96" y="340" fill="#111827" font-size="27" font-weight="720">Failure mode</text>
    <text x="520" y="340" fill="#111827" font-size="27" font-weight="720">Product effect</text>
    <line x1="96" y1="380" x2="1504" y2="380" stroke="#111827" stroke-width="2"/>

    <g fill="#374151" font-size="25" font-weight="420">
      <text x="96" y="460">Wrong action</text>
      <text x="520" y="450">The agent updates the wrong Jira issue, posts in the wrong</text>
      <text x="520" y="486">Slack channel, or creates a ticket in the wrong workspace</text>

      <text x="96" y="590">Failed action</text>
      <text x="520" y="590">The user asks the product to do something, and it never completes</text>

      <text x="96" y="720">Stale connector</text>
      <text x="520" y="710">The provider API changes, and a workflow that worked during</text>
      <text x="520" y="746">development breaks in production</text>
    </g>
    <line x1="96" y1="530" x2="1504" y2="530" stroke="#D5DAE1" stroke-width="1.5"/>
    <line x1="96" y1="660" x2="1504" y2="660" stroke="#D5DAE1" stroke-width="1.5"/>
    <text x="96" y="824" fill="#6B7280" font-size="18" font-weight="600">Samuel Umoren / AI Backend Notes</text>
  </g>
</svg>
