<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F5F7FA"/>

  <g font-family="Outfit, Avenir Next, Arial, sans-serif">
    <text x="96" y="92" fill="#6B7280" font-size="18" font-weight="600">AI Agent Integrations</text>
    <text x="96" y="154" fill="#111827" font-size="54" font-weight="700">A connector is not an integration.</text>
    <text x="96" y="202" fill="#4B5563" font-size="27" font-weight="400">The difference shows up when an agent tries to act inside a customer system.</text>

    <line x1="96" y1="254" x2="1504" y2="254" stroke="#D1D5DB" stroke-width="1.5"/>

    <text x="96" y="316" fill="#111827" font-size="30" font-weight="650">Example request</text>
    <text x="96" y="358" fill="#374151" font-size="28" font-weight="400">“Create a Jira ticket from this Zendesk escalation.”</text>

    <line x1="96" y1="416" x2="1504" y2="416" stroke="#D1D5DB" stroke-width="1.5"/>

    <g transform="translate(96 470)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="700">01</text>
      <text x="0" y="44" fill="#111827" font-size="34" font-weight="700">Connector</text>
      <text x="0" y="92" fill="#374151" font-size="24" font-weight="400">Can the product</text>
      <text x="0" y="124" fill="#374151" font-size="24" font-weight="400">reach Jira?</text>
      <line x1="0" y1="166" x2="270" y2="166" stroke="#111827" stroke-width="2"/>
      <text x="0" y="214" fill="#6B7280" font-size="20" font-weight="400">Adapter to the app</text>
    </g>

    <g transform="translate(444 470)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="700">02</text>
      <text x="0" y="44" fill="#111827" font-size="34" font-weight="700">Integration</text>
      <text x="0" y="92" fill="#374151" font-size="24" font-weight="400">Which user, account,</text>
      <text x="0" y="124" fill="#374151" font-size="24" font-weight="400">permissions, logs?</text>
      <line x1="0" y1="166" x2="270" y2="166" stroke="#111827" stroke-width="2"/>
      <text x="0" y="214" fill="#6B7280" font-size="20" font-weight="400">System around access</text>
    </g>

    <g transform="translate(792 470)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="700">03</text>
      <text x="0" y="44" fill="#111827" font-size="34" font-weight="700">Tool access</text>
      <text x="0" y="92" fill="#374151" font-size="24" font-weight="400">Can this agent create</text>
      <text x="0" y="124" fill="#374151" font-size="24" font-weight="400">tickets at all?</text>
      <line x1="0" y1="166" x2="270" y2="166" stroke="#111827" stroke-width="2"/>
      <text x="0" y="214" fill="#6B7280" font-size="20" font-weight="400">Actions the agent sees</text>
    </g>

    <g transform="translate(1140 470)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="700">04</text>
      <text x="0" y="44" fill="#111827" font-size="34" font-weight="700">Tool execution</text>
      <text x="0" y="92" fill="#374151" font-size="24" font-weight="400">What happens after it</text>
      <text x="0" y="124" fill="#374151" font-size="24" font-weight="400">calls create ticket?</text>
      <line x1="0" y1="166" x2="270" y2="166" stroke="#111827" stroke-width="2"/>
      <text x="0" y="214" fill="#6B7280" font-size="20" font-weight="400">Runtime checks and audit</text>
    </g>

    <line x1="386" y1="586" x2="414" y2="586" stroke="#9CA3AF" stroke-width="2"/>
    <path d="M414 586 L404 579 L404 593 Z" fill="#9CA3AF"/>
    <line x1="734" y1="586" x2="762" y2="586" stroke="#9CA3AF" stroke-width="2"/>
    <path d="M762 586 L752 579 L752 593 Z" fill="#9CA3AF"/>
    <line x1="1082" y1="586" x2="1110" y2="586" stroke="#9CA3AF" stroke-width="2"/>
    <path d="M1110 586 L1100 579 L1100 593 Z" fill="#9CA3AF"/>

    <line x1="96" y1="762" x2="1504" y2="762" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="96" y="816" fill="#111827" font-size="28" font-weight="650">Agent infrastructure carries context, permissions, execution, and auditability around the LLM.</text>
    <text x="96" y="860" fill="#6B7280" font-size="18" font-weight="600">Samuel Umoren / AI Backend Notes</text>
  </g>
</svg>
