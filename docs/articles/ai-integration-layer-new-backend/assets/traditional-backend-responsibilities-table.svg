<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F7F8FA"/>
  <g font-family="Outfit, Avenir Next, Arial, sans-serif">
    <text x="96" y="92" fill="#6B7280" font-size="18" font-weight="650">Traditional Backend</text>
    <text x="96" y="154" fill="#111827" font-size="52" font-weight="720">The familiar backend responsibilities.</text>
    <text x="96" y="204" fill="#4B5563" font-size="27" font-weight="400">These responsibilities remain when a product adds AI capabilities.</text>
    <line x1="96" y1="264" x2="1504" y2="264" stroke="#D5DAE1" stroke-width="1.5"/>

    <text x="96" y="326" fill="#111827" font-size="25" font-weight="720">Responsibility</text>
    <text x="520" y="326" fill="#111827" font-size="25" font-weight="720">What it handles</text>
    <line x1="96" y1="360" x2="1504" y2="360" stroke="#111827" stroke-width="2"/>

    <g fill="#374151" font-size="24" font-weight="420">
      <text x="96" y="414">Users</text><text x="520" y="414">The people and accounts that exist in the product</text>
      <text x="96" y="466">Authentication</text><text x="520" y="466">The process that verifies who is making a request</text>
      <text x="96" y="518">Authorization</text><text x="520" y="518">The rules that decide what the user can do</text>
      <text x="96" y="570">Databases</text><text x="520" y="570">The place where product state is stored and queried</text>
      <text x="96" y="622">Business logic</text><text x="520" y="622">The product rules that run after a request is made</text>
      <text x="96" y="674">APIs</text><text x="520" y="674">The interfaces that let systems exchange data</text>
      <text x="96" y="726">Queues</text><text x="520" y="726">The path for work that should run asynchronously</text>
      <text x="96" y="778">Background jobs</text><text x="520" y="778">Scheduled or long-running work outside the request cycle</text>
      <text x="96" y="830">Permissions</text><text x="520" y="830">The rules that control access to data and actions</text>
    </g>
    <text x="96" y="872" fill="#6B7280" font-size="18" font-weight="600">Samuel Umoren / AI Backend Notes</text>
  </g>
</svg>
