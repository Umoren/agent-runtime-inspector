<!--
Reusable three-path diagram template.

Replace:
- {{KICKER}}
- {{TITLE}}
- {{SUBTITLE}}
- {{PATH_1_LABEL}}, {{PATH_1_TEXT}}
- {{PATH_2_LABEL}}, {{PATH_2_TEXT}}
- {{PATH_3_LABEL}}, {{PATH_3_TEXT}}
- {{FOOTER}}

Keep the credit marker unless explicitly publishing in a context where byline credit is already visible.
-->
<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F7F8FA"/>

  <g font-family="Outfit, Avenir Next, Arial, sans-serif">
    <text x="96" y="92" fill="#6B7280" font-size="18" font-weight="650">{{KICKER}}</text>
    <text x="96" y="154" fill="#111827" font-size="54" font-weight="720">{{TITLE}}</text>
    <text x="96" y="204" fill="#4B5563" font-size="27" font-weight="400">{{SUBTITLE}}</text>

    <line x1="96" y1="268" x2="1504" y2="268" stroke="#D5DAE1" stroke-width="1.5"/>

    <g transform="translate(96 354)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="750">01</text>
      <text x="0" y="52" fill="#111827" font-size="38" font-weight="720">{{PATH_1_LABEL}}</text>
      <text x="0" y="104" fill="#374151" font-size="25" font-weight="400">{{PATH_1_TEXT}}</text>
      <line x1="0" y1="158" x2="360" y2="158" stroke="#111827" stroke-width="2"/>
    </g>

    <g transform="translate(610 354)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="750">02</text>
      <text x="0" y="52" fill="#111827" font-size="38" font-weight="720">{{PATH_2_LABEL}}</text>
      <text x="0" y="104" fill="#374151" font-size="25" font-weight="400">{{PATH_2_TEXT}}</text>
      <line x1="0" y1="158" x2="360" y2="158" stroke="#111827" stroke-width="2"/>
    </g>

    <g transform="translate(1124 354)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="750">03</text>
      <text x="0" y="52" fill="#111827" font-size="38" font-weight="720">{{PATH_3_LABEL}}</text>
      <text x="0" y="104" fill="#374151" font-size="25" font-weight="400">{{PATH_3_TEXT}}</text>
      <line x1="0" y1="158" x2="360" y2="158" stroke="#111827" stroke-width="2"/>
    </g>

    <line x1="96" y1="650" x2="1504" y2="650" stroke="#D5DAE1" stroke-width="1.5"/>
    <text x="96" y="716" fill="#111827" font-size="31" font-weight="650">{{FOOTER}}</text>

    <text x="96" y="824" fill="#6B7280" font-size="18" font-weight="600">Samuel Umoren / AI Backend Notes</text>
  </g>
</svg>
