<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F7F8FA"/>
  <g font-family="Outfit, Avenir Next, Arial, sans-serif">
    <text x="96" y="92" fill="#6B7280" font-size="18" font-weight="650">AI Backend Additions</text>
    <text x="96" y="154" fill="#111827" font-size="52" font-weight="720">The AI layer adds runtime responsibilities.</text>
    <text x="96" y="204" fill="#4B5563" font-size="27" font-weight="400">These jobs sit around the LLM, the agent, and customer systems.</text>
    <line x1="96" y1="264" x2="1504" y2="264" stroke="#D5DAE1" stroke-width="1.5"/>

    <text x="96" y="326" fill="#111827" font-size="25" font-weight="720">Responsibility</text>
    <text x="560" y="326" fill="#111827" font-size="25" font-weight="720">What it handles</text>
    <line x1="96" y1="360" x2="1504" y2="360" stroke="#111827" stroke-width="2"/>

    <g fill="#374151" font-size="24" font-weight="420">
      <text x="96" y="416">Context sync</text><text x="560" y="416">Keeping customer data from source systems current</text>
      <text x="96" y="472">Permission-aware retrieval</text><text x="560" y="472">Sending the LLM only the data the user can access</text>
      <text x="96" y="528">Data normalization</text><text x="560" y="528">Turning different source shapes into usable context</text>
      <text x="96" y="584">Tool execution</text><text x="560" y="584">Running agent actions against external systems</text>
      <text x="96" y="640">Model routing</text><text x="560" y="640">Choosing the provider and model for a request</text>
      <text x="96" y="696">Observability</text><text x="560" y="696">Recording what happened during the AI workflow</text>
      <text x="96" y="752">Governance</text><text x="560" y="752">Applying rules for data, tools, models, and sensitive workflows</text>
      <text x="96" y="808">Cost control</text><text x="560" y="808">Tracking and limiting model spend</text>
    </g>
    <text x="96" y="872" fill="#6B7280" font-size="18" font-weight="600">Samuel Umoren / AI Backend Notes</text>
  </g>
</svg>
