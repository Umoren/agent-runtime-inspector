<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F7F8FA"/>
  <g font-family="Outfit, Avenir Next, Arial, sans-serif">
    <text x="96" y="92" fill="#6B7280" font-size="18" font-weight="650">Model Control Plane</text>
    <text x="96" y="154" fill="#111827" font-size="54" font-weight="720">Model choice moves into policy.</text>
    <text x="96" y="204" fill="#4B5563" font-size="27" font-weight="400">Routing uses product goals, eval scores, fallback rules, and audit requirements.</text>

    <line x1="96" y1="270" x2="1504" y2="270" stroke="#D5DAE1" stroke-width="1.5"/>

    <g transform="translate(96 382)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="750">01</text>
      <text x="0" y="54" fill="#111827" font-size="32" font-weight="720">Request</text>
      <text x="0" y="102" fill="#4B5563" font-size="22" font-weight="400">Task and context</text>
      <line x1="0" y1="150" x2="210" y2="150" stroke="#111827" stroke-width="2"/>
    </g>
    <line x1="330" y1="532" x2="386" y2="532" stroke="#A8B0BC" stroke-width="2"/>
    <path d="M386 532 L374 524 L374 540 Z" fill="#A8B0BC"/>

    <g transform="translate(424 382)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="750">02</text>
      <text x="0" y="54" fill="#111827" font-size="32" font-weight="720">Routing policy</text>
      <text x="0" y="102" fill="#4B5563" font-size="22" font-weight="400">Cost, quality, uptime</text>
      <line x1="0" y1="150" x2="250" y2="150" stroke="#111827" stroke-width="2"/>
    </g>
    <line x1="698" y1="532" x2="754" y2="532" stroke="#A8B0BC" stroke-width="2"/>
    <path d="M754 532 L742 524 L742 540 Z" fill="#A8B0BC"/>

    <g transform="translate(792 382)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="750">03</text>
      <text x="0" y="54" fill="#111827" font-size="32" font-weight="720">Provider/model</text>
      <text x="0" y="102" fill="#4B5563" font-size="22" font-weight="400">Selected route</text>
      <line x1="0" y1="150" x2="250" y2="150" stroke="#111827" stroke-width="2"/>
    </g>
    <line x1="1066" y1="532" x2="1122" y2="532" stroke="#A8B0BC" stroke-width="2"/>
    <path d="M1122 532 L1110 524 L1110 540 Z" fill="#A8B0BC"/>

    <g transform="translate(1160 382)">
      <text x="0" y="0" fill="#2563EB" font-size="16" font-weight="750">04</text>
      <text x="0" y="54" fill="#111827" font-size="32" font-weight="720">Explanation</text>
      <text x="0" y="102" fill="#4B5563" font-size="22" font-weight="400">Why this route won</text>
      <line x1="0" y1="150" x2="230" y2="150" stroke="#111827" stroke-width="2"/>
    </g>
    <text x="96" y="628" fill="#4B5563" font-size="24" font-weight="430">The decision log records the policy, criteria, weights, eval scores, and final model choice.</text>

    <line x1="96" y1="700" x2="1504" y2="700" stroke="#D5DAE1" stroke-width="1.5"/>
    <text x="96" y="766" fill="#111827" font-size="31" font-weight="650">Routing becomes backend policy for cost, reliability, governance, and user experience.</text>
    <text x="96" y="824" fill="#6B7280" font-size="18" font-weight="600">Samuel Umoren / AI Backend Notes</text>
  </g>
</svg>
